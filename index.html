<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Department Performance Measures</title>

<link rel="stylesheet" href="styles.css">

<style>

  *{
    box-sizing:border-box;
  }

  body{
    margin:0;
    background:#f5f7fa;
    font-family:Arial, Helvetica, sans-serif;
    color:#172033;
  }

  .wc-performance-page{
    width:100%;
    max-width:1400px;
    margin:0 auto;
    padding:54px 24px 80px;
  }

  .wc-performance-header{
    margin-bottom:34px;
  }

  .wc-performance-header h1{
    margin:0 0 14px 0;
    font-size:44px;
    line-height:1.1;
    color:#172033;
  }

  .wc-performance-header p{
    margin:0;
    max-width:900px;
    color:#475467;
    font-size:17px;
    line-height:1.7;
  }

  .wc-performance-card{
    background:#ffffff;
    border-radius:28px;
    border:1px solid rgba(209,190,120,0.34);
    overflow:hidden;
    box-shadow:
      0 18px 44px rgba(0,98,49,0.08),
      0 6px 14px rgba(36,52,77,0.06);
  }

  .wc-performance-card-header{
    padding:34px;
    background:#006231;
    color:#ffffff;
  }

  .wc-performance-card-header span{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    margin-bottom:16px;
    padding:8px 14px;
    border-radius:999px;
    background:rgba(255,255,255,0.12);
    font-size:12px;
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;
  }

  .wc-performance-card-header h2{
    margin:0 0 16px 0;
    font-size:34px;
    line-height:1.15;
  }

  .wc-performance-card-header p{
    margin:0;
    max-width:1000px;
    color:rgba(255,255,255,0.88);
    font-size:16px;
    line-height:1.7;
  }

  .wc-performance-table-wrap{
    width:100%;
    overflow-x:auto;
  }

  .wc-performance-table{
    width:100%;
    border-collapse:collapse;
    min-width:1100px;
  }

  .wc-performance-table thead{
    background:#eef5f0;
  }

  .wc-performance-table th{
    padding:18px 20px;
    color:#006231;
    font-size:12px;
    font-weight:800;
    letter-spacing:.08em;
    text-transform:uppercase;
    text-align:left;
    border-bottom:1px solid rgba(0,98,49,0.08);
  }

  .wc-performance-table td{
    padding:20px;
    vertical-align:top;
    border-bottom:1px solid rgba(23,32,51,0.08);
    font-size:15px;
    line-height:1.6;
    color:#344054;
  }

  .wc-performance-table tbody tr:hover{
    background:#fafcfb;
  }

  .wc-performance-objective{
    min-width:280px;
    font-weight:600;
    color:#172033;
  }

  .wc-performance-measure{
    min-width:320px;
  }

  .wc-performance-value{
    min-width:120px;
    text-align:right;
    white-space:nowrap;
    font-weight:700;
    color:#172033;
  }

  @media(max-width:900px){

    .wc-performance-page{
      padding:34px 16px 60px;
    }

    .wc-performance-header h1{
      font-size:34px;
    }

    .wc-performance-card-header{
      padding:24px;
    }

    .wc-performance-card-header h2{
      font-size:28px;
    }

  }

</style>

</head>

<body>

<div id="app"></div>

<script src="performance-measures.js"></script>
<script src="app.js"></script>

</body>
</html>
